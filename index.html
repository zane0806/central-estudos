<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101418">
    <meta http-equiv="cache-control" content="no-cache">
    <meta http-equiv="pragma" content="no-cache">
    <meta
      name="description"
      content="Dashboard de estudos para acompanhar notas, provas antigas e a meta de 92% de acertos."
    >
    <title>Zan. Vest</title>
    <link rel="stylesheet" href="./styles.css?v=20260704-4">
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="page-title">
        <div class="hero__content">
          <h1 id="page-title">Zan. Vest</h1>
          <div class="hero__actions">
            <a class="button button--primary" href="#entry-card">
              Registrar prova
            </a>
            <span class="status" id="data-status">Dados salvos neste navegador</span>
          </div>
        </div>
      </section>

      <section class="board-switcher" aria-label="Escolher vestibular">
        <button class="board-tab is-active" type="button" data-board="enem">ENEM</button>
        <button class="board-tab" type="button" data-board="unesp">UNESP</button>
        <button class="board-tab" type="button" data-board="famema">FAMEMA</button>
        <button class="board-tab" type="button" data-board="famerp">FAMERP</button>
        <button class="board-tab" type="button" data-board="unifesp">UNIFESP</button>
      </section>

      <section class="entry-section" id="entry-card" aria-labelledby="entry-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">lancar dados</p>
            <h2 id="entry-title">Nova prova</h2>
          </div>
          <div class="entry-actions">
            <button class="button button--secondary" type="button" id="export-data">Exportar</button>
            <button class="button button--secondary" type="button" id="import-data">Importar</button>
            <button class="button button--ghost" type="button" id="reset-data">Restaurar base</button>
            <input id="import-file" type="file" accept="application/json" hidden>
          </div>
        </div>

        <form class="exam-form" id="exam-form">
          <input type="hidden" id="exam-id">
          <label>
            Prova
            <input id="exam-name" name="prova" type="text" placeholder="Ex: ENEM 2025 PPL" required>
          </label>
          <div class="score-fields" id="score-fields"></div>
          <label class="exam-form__wide">
            Observacoes
            <input id="exam-notes" name="obs" type="text" placeholder="Opcional">
          </label>
          <div class="form-total" aria-live="polite">
            <span>Total</span>
            <strong id="form-total">0/180</strong>
          </div>
          <div class="form-submit">
            <button class="button button--primary-dark" type="submit" id="save-exam">Salvar prova</button>
            <button class="button button--secondary" type="button" id="cancel-edit" hidden>Cancelar edicao</button>
          </div>
        </form>
      </section>

      <section class="dashboard">
        <article class="chart-card chart-card--wide">
          <div class="section-heading">
            <div>
              <p class="eyebrow">provas antigas</p>
              <h2>Evolucao por prova</h2>
            </div>
            <span class="pill" id="chart-goal-pill">Meta 166</span>
          </div>
          <canvas id="progress-chart" height="260" aria-label="Grafico de evolucao por prova"></canvas>
        </article>

        <article class="chart-card exam-carousel-card">
          <div class="section-heading">
            <div>
              <p class="eyebrow">por prova</p>
              <h2>Mapa de cada prova</h2>
            </div>
            <span class="pill">rolagem</span>
          </div>
          <div class="exam-carousel" id="exam-carousel" aria-label="Graficos por prova"></div>
        </article>

        <article class="target-card">
          <div class="section-heading">
            <div>
              <p class="eyebrow">rota</p>
              <h2>Metas por bloco</h2>
            </div>
          </div>
          <div class="target-list" id="target-list"></div>
        </article>
      </section>

      <section class="table-section" aria-labelledby="table-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">historico</p>
            <h2 id="table-title">Provas registradas</h2>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Prova</th>
                <th>Humanas</th>
                <th>Linguagens</th>
                <th>Matematica</th>
                <th>Natureza</th>
                <th>Total</th>
                <th>Status</th>
                <th>Acoes</th>
              </tr>
            </thead>
            <tbody id="exam-table"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js?v=20260704-4"></script>
  </body>
</html>
